<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect width="32" height="32" rx="7" fill="#D97706"/>
  <rect width="32" height="32" rx="7" fill="url(#shine)" opacity="0.18"/>
  <defs>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
 
  <!-- Measuring cup body (trapezoid) -->
  <path d="M7 7 L10 26 L22 26 L25 7 Z" fill="none" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/>
 
  <!-- Pour spout on the left -->
  <path d="M7 7 Q5 6 4.5 8" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
 
  <!-- Handle on the right -->
  <path d="M25 10 Q29 10 29 15 Q29 20 25 20" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
 
  <!-- Measurement lines inside cup -->
  <line x1="12.5" y1="14" x2="20" y2="14" stroke="#fff" stroke-width="1" stroke-opacity="0.7"/>
  <line x1="11.5" y1="20" x2="21" y2="20" stroke="#fff" stroke-width="1" stroke-opacity="0.7"/>
 
  <!-- Small "g" label bottom-right -->
  <text x="19.5" y="24.5" font-family="Georgia, serif" font-size="6.5" font-weight="700" fill="#FCD34D" text-anchor="middle">g</text>
</svg>
