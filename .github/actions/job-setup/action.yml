name: Job Setup
description: Sets up the environment for CI jobs

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v6
    - uses: pnpm/action-setup@v6
      with:
        version: 10
        cache: true
    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: pnpm\
    - run: pnpm install --frozen-lockfile
      shell: bash
