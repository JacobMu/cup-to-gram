name: CI

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    install-deps:
        name: Install dependencies
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile=false

    audit:
        name: Audit vulnerabilities
        runs-on: ubuntu-latest
        needs: [ install-deps ]
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm audit --audit-level=high

    lint:
        name: Lint
        runs-on: ubuntu-latest
        needs: [ install-deps, audit ]
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm lint

    format-check:
        name: Format check
        runs-on: ubuntu-latest
        needs: [ install-deps, audit ]
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm format:check

    test:
        name: Test
        runs-on: ubuntu-latest
        needs: [ install-deps, audit ]
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm test
